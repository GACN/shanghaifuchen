name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true

    - name: Install SDK platforms
      run: sdkmanager "platforms;android-28" "build-tools;28.0.3"

    - name: Build Debug APK
      run: |
        chmod +x gradlew 2>/dev/null || true
        gradle wrapper --gradle-version 8.5
        ./gradlew assembleDebug

    - name: Rename APK
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk shanghaifuchen-debug.apk
        sha256sum shanghaifuchen-debug.apk > shanghaifuchen-debug.sha256.txt

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: shanghaifuchen-debug
        path: shanghaifuchen-debug.apk

    - name: Create/Update Release
      if: github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v21
        name: "v21 - 液态玻璃UI改版"
        files: |
          shanghaifuchen-debug.apk
          shanghaifuchen-debug.sha256.txt
        append_body: true
        body: |
          ## Latest Build (auto)
          Built by GitHub Actions on ${{ github.event.head_commit.timestamp }}
          Commit: ${{ github.sha }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
