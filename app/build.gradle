plugins {
    id 'com.android.application'
}

android {
    namespace 'com.xiaoguo.shanghaifuchen'
    compileSdk 28

    defaultConfig {
        applicationId "com.xiaoguo.shanghaifuchen"
        minSdk 23
        targetSdk 28
        versionCode 6
        versionName "1.0.5"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
}

dependencies {
}
